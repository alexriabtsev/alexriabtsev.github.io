<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <link rel="icon" href="/favicon.ico">
  <style>
    :root { --ink:#1a202c; --muted:#4a5568; --accent:#2b6cb0; --bg:#ffffff; --soft:#f7fafc; --line:#e2e8f0; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
           color:var(--ink); background:var(--bg); line-height:1.6; }
    .wrap { max-width:880px; margin:0 auto; padding:0 24px; }
    header.hero { padding:72px 0 56px; }
    .hero h1 { font-size:2.4rem; line-height:1.2; margin-bottom:16px; }
    .hero p.sub { font-size:1.25rem; color:var(--muted); max-width:640px; margin-bottom:28px; }
    .cta { display:inline-block; background:var(--accent); color:#fff; padding:14px 28px; border-radius:8px;
           text-decoration:none; font-weight:600; font-size:1.05rem; }
    .cta.secondary { background:transparent; color:var(--accent); border:2px solid var(--accent); margin-left:12px; }
    section { padding:48px 0; border-top:1px solid var(--line); }
    h2 { font-size:1.6rem; margin-bottom:20px; }
    .cols { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:24px; }
    .card { background:var(--soft); border-radius:10px; padding:24px; }
    .card h3 { font-size:1.05rem; margin-bottom:8px; }
    .card p { color:var(--muted); font-size:.95rem; }
    .step { display:flex; gap:16px; margin-bottom:20px; align-items:baseline; }
    .step .n { font-size:1.4rem; font-weight:700; color:var(--accent); min-width:32px; }
    .about { display:flex; gap:28px; align-items:center; flex-wrap:wrap; }
    .about img { width:120px; height:120px; border-radius:50%; object-fit:cover; }
    .about p { color:var(--muted); max-width:560px; }
    .price { font-size:1.15rem; margin-bottom:8px; }
    footer { padding:40px 0 56px; border-top:1px solid var(--line); color:var(--muted); font-size:.9rem; }
    footer a { color:var(--accent); text-decoration:none; }
    @media (max-width:600px){ .hero h1{font-size:1.8rem} .cta.secondary{margin-left:0;margin-top:12px} }
  </style>
</head>
<body>
  {{ content }}
  <footer>
    <div class="wrap">
      <p><strong>{{ site.plainwhite.name }}</strong> · B2B lead generation · <a href="mailto:{{ page.contact_email }}">{{ page.contact_email }}</a></p>
      <p>{{ page.postal_address }}</p>
      <p><a href="/privacy/">Privacy Policy</a> · <a href="/blog/">Blog (Ukrainian)</a></p>
    </div>
  </footer>
</body>
</html>
